# Đảm bảo l10n được tạo trước khi analyze (file sinh ra trong frontend/lib/l10n).
name: Flutter frontend

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

defaults:
  run:
    working-directory: frontend

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Create stub api_keys.dart for CI
        run: |
          mkdir -p lib/core/config
          cat > lib/core/config/api_keys.dart << 'EOF'
          abstract final class ApiKeys {
            static const naverClientId     = '';
            static const naverClientSecret = '';
          }
          EOF
      - run: flutter analyze
      - run: flutter test
